<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FastLoan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            background: linear-gradient(135deg, #0b2b40, #1a4b6e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo span { font-size: 2.5rem; }
        .logo h1 { color: #0f2c39; font-size: 1.8rem; }
        .logo h1 span { color: #6bcbff; font-size: 1.8rem; }
        h2 { color: #0f2c39; margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: #666; margin-bottom: 2rem; text-align: center; }
        input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 0.8rem;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.9rem;
            background: #0f2c39;
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #1b4f66; }
        .error { color: red; margin-top: 1rem; text-align: center; }
        .success { color: green; margin-top: 1rem; text-align: center; }
        .login-link { text-align: center; margin-top: 1rem; }
        a { color: #0f2c39; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <span>🔐</span>
        <h1>Fast<span>Loan</span></h1>
    </div>
    <h2>Forgot Password?</h2>
    <p class="subtitle">Enter your email to reset your password</p>
    
    <form id="forgotForm">
        <input type="email" id="email" placeholder="Email Address" required>
        <button type="submit">Send Reset Link</button>
        <div id="message"></div>
    </form>
    
    <p class="login-link"><a href="login.html">← Back to Login</a></p>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        
        try {
            const response = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('message').innerHTML = '<div class="success">✅ Reset link sent to your email! Check your inbox.</div>';
                document.getElementById('forgotForm').reset();
            } else {
                document.getElementById('message').innerHTML = `<div class="error">❌ ${data.error}</div>`;
            }
        } catch (error) {
            document.getElementById('message').innerHTML = '<div class="error">❌ Server error. Please try again.</div>';
        }
    });
</script>
</body>
</html>
