<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FastLoan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            background: linear-gradient(135deg, #0b2b40, #1a4b6e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo span {
            font-size: 2.5rem;
        }
        .logo h1 {
            color: #0f2c39;
            font-size: 1.8rem;
        }
        .logo h1 span {
            color: #6bcbff;
            font-size: 1.8rem;
        }
        h2 { color: #0f2c39; margin-bottom: 0.5rem; text-align: center; }
        .subtitle { color: #666; margin-bottom: 2rem; text-align: center; }
        input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 0.8rem;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.9rem;
            background: #0f2c39;
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #1b4f66; }
        .error { color: red; margin-top: 1rem; text-align: center; }
        .register-link { text-align: center; margin-top: 1rem; }
        .forgot-link { text-align: center; margin-top: 0.5rem; }
        a { color: #0f2c39; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #999;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ddd;
        }
        .divider span { padding: 0 1rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <span>🏦</span>
        <h1>Fast<span>Loan</span></h1>
    </div>
    <h2>🔐 Welcome Back</h2>
    <p class="subtitle">Login to your account</p>
    
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <!-- Forgot Password Link - Added here -->
        <div class="forgot-link">
            <a href="forgot-password.html">🔑 Forgot Password?</a>
        </div>
        
        <button type="submit">Login</button>
        <div id="message"></div>
    </form>
    
    <div class="divider">
        <span>or</span>
    </div>
    
    <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                if (data.user.isAdmin) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                document.getElementById('message').innerHTML = `<div class="error">❌ ${data.error}</div>`;
            }
        } catch (error) {
            document.getElementById('message').innerHTML = '<div class="error">❌ Server error. Please try again.</div>';
        }
    });
</script>
</body>
</html>
