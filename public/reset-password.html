<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FastLoan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: linear-gradient(135deg, #0b2b40, #1a4b6e); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .container { max-width: 450px; width: 100%; background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { color: #0f2c39; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 0.8rem; font-size: 1rem; }
        button { width: 100%; padding: 0.9rem; background: #0f2c39; color: white; border: none; border-radius: 0.8rem; font-size: 1rem; font-weight: bold; cursor: pointer; }
        button:hover { background: #1b4f66; }
        .error { color: red; margin-top: 1rem; text-align: center; }
        .success { color: green; margin-top: 1rem; text-align: center; }
        .login-link { text-align: center; margin-top: 1rem; }
        a { color: #0f2c39; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 Reset Password</h1>
    <p>Enter your new password below.</p>
    <form id="resetForm">
        <input type="password" id="newPassword" placeholder="New Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <button type="submit">Reset Password</button>
        <div id="message"></div>
    </form>
    <p class="login-link"><a href="login.html">← Back to Login</a></p>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    if (!token) {
        document.getElementById('message').innerHTML = '<div class="error">Invalid reset link</div>';
    }
    
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (newPassword !== confirmPassword) {
            document.getElementById('message').innerHTML = '<div class="error">Passwords do not match</div>';
            return;
        }
        if (newPassword.length < 6) {
            document.getElementById('message').innerHTML = '<div class="error">Password must be at least 6 characters</div>';
            return;
        }
        
        try {
            const response = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, new_password: newPassword })
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('message').innerHTML = '<div class="success">✅ Password reset successful! <a href="login.html">Login here</a></div>';
                document.getElementById('resetForm').reset();
            } else {
                document.getElementById('message').innerHTML = `<div class="error">❌ ${data.error}</div>`;
            }
        } catch (error) {
            document.getElementById('message').innerHTML = '<div class="error">❌ Server error</div>';
        }
    });
</script>
</body>
</html>
